<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive-Mind Market Alerts</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #07070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #00f0ff;
            --accent-red: #ff2a5f;
            --accent-green: #00ff88;
            --text-main: #e2e2e2;
            --text-muted: #888899;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .background-glow {
            position: fixed; top: -20%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(0,240,255,0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; border-radius: 50%;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 50px; animation: fadeInDown 1s ease-out; }
        header h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        header h1 span { color: var(--accent-blue); text-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        header p { color: var(--text-muted); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        main {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 40px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        h2 { color: #fff; font-size: 2rem; margin-top: 30px; margin-bottom: 20px; border-bottom: 1px solid var(--card-border); padding-bottom: 10px; }
        h3 { color: var(--accent-blue); margin-top: 25px; margin-bottom: 15px; font-size: 1.4rem; }
        p { margin-bottom: 15px; }
        ul { margin-bottom: 20px; padding-left: 20px; }
        li { margin-bottom: 8px; color: var(--text-muted); }
        li strong { color: var(--text-main); }
        a { color: var(--accent-blue); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .alert { padding: 20px; border-radius: 12px; margin: 25px 0; background: rgba(0,0,0,0.3); border-left: 4px solid var(--accent-blue); }
        .alert-caution { border-left-color: var(--accent-red); box-shadow: inset 0 0 20px rgba(255, 42, 95, 0.05); }
        .alert-caution strong { color: var(--accent-red); }
        .alert-warning { border-left-color: var(--accent-green); box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05); }
        .alert-warning strong { color: var(--accent-green); }
        hr { border: 0; height: 1px; background: var(--card-border); margin: 40px 0; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <h1>Hive-Mind <span>Terminal</span></h1>
            <p>Real-time V2 Confluence Orchestration</p>
        </header>
        <main id="content"></main>
    </div>
    <script>
        const rawMd = `# V2 Market Alerts & System Walkthrough

---

## System Status
*   **Subagents**: 10 V2 data gatherers + 1 Risk Evaluator are fully operational.
*   **Workflow**: The V2 Confluence Orchestration pipeline is verified.
*   **Automation**: A recurring background task is actively scheduled to run this massive 11-agent scan every day at 9:00 AM EST.
`;
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(rawMd);

        document.querySelectorAll('blockquote').forEach(quote => {
            if (quote.innerHTML.includes('[!CAUTION]')) {
                quote.classList.add('alert', 'alert-caution');
                quote.innerHTML = quote.innerHTML.replace('[!CAUTION]', '');
            } else if (quote.innerHTML.includes('[!WARNING]')) {
                quote.classList.add('alert', 'alert-warning');
                quote.innerHTML = quote.innerHTML.replace('[!WARNING]', '');
            } else {
                quote.classList.add('alert');
            }
        });
    </script>
</body>
</html>
