        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = marked.parse(rawMd);

        document.querySelectorAll('blockquote').forEach(quote => {
            quote.classList.add('alert');
            if (quote.innerHTML.includes('[!CAUTION]')) {
                quote.innerHTML = quote.innerHTML.replace('[!CAUTION]', '');
            } else if (quote.innerHTML.includes('[!WARNING]')) {
                quote.innerHTML = quote.innerHTML.replace('[!WARNING]', '');
            }
        });
